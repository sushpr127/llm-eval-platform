llm_eval:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: 5432
      user: "{{ env_var('POSTGRES_USER', 'eval_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'eval_pass') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'eval_db') }}"
      schema: analytics
      threads: 1
